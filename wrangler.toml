name = "kair-os"
main = "build/worker/shim.mjs"
compatibility_date = "2024-11-01"

[build]
command = "cargo install -q worker-build && worker-build --release"

[[durable_objects.bindings]]
name = "KAIROS_TASK"
class_name = "KairosTask"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["KairosTask"]

# NO cron triggers — KAIR.OS is self-scheduling via DO Alarms
# Optionally add heartbeat: [triggers] crons = ["* * * * *"]
